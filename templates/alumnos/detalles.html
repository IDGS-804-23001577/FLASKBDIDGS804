{% extends "layout.html" %}
{% block container %}
{% import "_macros.html" as macros%}
 
<div class="relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs mx-auto mt-10">
    <button id="dropdownButton" data-dropdown-toggle="dropdown"
        class="absolute top-2 end-2 text-body hover:text-heading bg-neutral-primary-soft box-border border border-transparent hover:bg-neutral-tertiary focus:ring-4 focus:ring-neutral-tertiary rounded-base p-1.5 focus:outline-none"
        type="button">
        <span class="sr-only">Open dropdown</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="3" d="M6 12h.01m6 0h.01m5.99 0h.01" />
        </svg>
    </button>

    <div id="dropdown" class="z-10 bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-36 block hidden">
        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownButton">
            <li>
                <a href="{{ url_for('alumnos.modificar', id=id) }}" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md">Editar</a>
            </li>
            <li>
                <a href="{{ url_for('alumnos.eliminar', id=id) }}" class="inline-flex items-center w-full p-2 text-fg-danger hover:bg-neutral-tertiary-medium rounded-md">Eliminar</a>
            </li>
        </ul>
    </div>

    <div class="flex flex-col items-center">
        <div class="w-24 h-24 mb-6 rounded-full bg-brand-medium flex items-center justify-center text-white text-3xl font-bold">
            {{ nombre[0] }}{{ apellidos[0] }}
        </div>
        <h5 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">
            {{ nombre }} {{ apellidos }}
        </h5>
        <span class="text-sm text-body">
            {{ email }}
        </span>
        <div class="flex mt-4 md:mt-6 gap-4">
            <a href="{{ url_for('alumnos.tabla') }}"
                class="inline-flex items-center text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
                <svg class="w-4 h-4 me-1.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12l4-4m-4 4 4 4"/>
                </svg>
                Regresar
            </a>
        </div>
    </div>
</div>
 
{% endblock %}
